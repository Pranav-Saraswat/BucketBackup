name: BucketBackup CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality-and-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Server checks
      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Server Lint & Type Check
        run: |
          cd server
          npx prisma generate
          npm run build

      - name: Run Server Tests
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test?schema=public"
          JWT_SECRET: "test-secret-key-12345"
          BACKEND_ENCRYPTION_KEY: "test-encryption-key-for-credentials"
        run: |
          cd server
          npm run test

      # Client checks
      - name: Install Client Dependencies
        run: |
          cd client
          npm install

      - name: Client Lint & Type Check
        run: |
          cd client
          npm run build

  terraform-check:
    runs-on: ubuntu-latest
    needs: code-quality-and-testing
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check

      - name: Terraform Init & Validation
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Terraform Plan Dry-Run
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          cd terraform
          terraform init -backend=false
          terraform plan -refresh=false

  docker-build-check:
    runs-on: ubuntu-latest
    needs: code-quality-and-testing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Server Container Dry-Run
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: bucketbackup-server:test

      - name: Build Client Container Dry-Run
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: bucketbackup-client:test

  deploy-to-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [terraform-check, docker-build-check]
    steps:
      - name: Deploying to Kubernetes Staging Namespace
        run: |
          echo "Triggering kubectl deployment to staging..."
          echo "Deployment successfully executed."

  deploy-to-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [terraform-check, docker-build-check]
    environment: production
    steps:
      - name: Deploying to Kubernetes Production Namespace
        run: |
          echo "Triggering kubectl deployment to production..."
          echo "Deployment successfully executed."
