name: BucketBackup CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build Server
        run: |
          cd server
          npm install
          npx prisma generate
          npm run build

      - name: Install & Build Client
        run: |
          cd client
          npm install
          npm run build

  infrastructure-plan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          cd terraform
          terraform init
          terraform plan

  deploy-to-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: infrastructure-plan
    steps:
      - name: Deploying to Staging...
        run: echo "Deployment logic for staging goes here"

  deploy-to-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: infrastructure-plan
    environment: production
    steps:
      - name: Deploying to Production...
        run: echo "Deployment logic for production goes here"
